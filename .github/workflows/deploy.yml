name: Deploy Majordom

on:
  push:
    branches: [main]
    paths:
      - "majordom-financiar/**"
      - "tools/vehicle-manager/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest changes
        run: |
          git -C "$MAJORDOM_PATH" fetch origin
          git -C "$MAJORDOM_PATH" reset --hard origin/main

      - name: Rebuild and restart services
        run: |
          cd "$MAJORDOM_PATH/majordom-financiar"
          docker compose build --no-cache majordom-api majordom-web vehicle-manager
          docker compose up -d
