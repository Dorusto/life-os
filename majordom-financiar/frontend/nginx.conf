server {
    listen 80;

    # Serve the React build output
    root /usr/share/nginx/html;
    index index.html;

    # React is a Single Page Application — all routes are handled by index.html.
    # Without this, refreshing /receipt would return 404 from Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI backend.
    # Why proxy through Nginx instead of exposing the API directly?
    # - Single port for both frontend and API (cleaner for Coolify/Tailscale)
    # - majordom-api is not exposed to the host network, only to Docker network
    # - One HTTPS certificate covers everything
    location /api/ {
        proxy_pass http://majordom-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Allow large image uploads (receipt photos from phones can be 10-20MB)
        client_max_body_size 25M;
        proxy_read_timeout 120s; # OCR can take up to 60s on CPU
    }

    # Proxy uploaded receipt images
    location /uploads/ {
        proxy_pass http://majordom-api:8000/uploads/;
        proxy_set_header Host $host;
    }

    # Cache static assets aggressively — Vite adds content hashes to filenames
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html so the app always loads the latest version
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
