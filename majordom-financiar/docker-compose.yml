services:
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    ports:
      - "127.0.0.1:5006:5006"
    volumes:
      - actual-data:/data
    networks:
      - majordom-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5006/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # --- Ollama (optional — use profile ollama-local when GPU is available locally) ---
  # To connect to an external Ollama server instead, set LLM_BASE_URL in .env and
  # start without this profile: docker compose up
  ollama:
    profiles: ["ollama-local"]
    image: ollama/ollama:latest
    container_name: majordom-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-qwen3.5:9b}
      - LLM_CHAT_MODEL=${LLM_CHAT_MODEL:-qwen3.5:9b}
      - OLLAMA_FLASH_ATTENTION=1
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - majordom-net
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list 2>/dev/null | grep -qE 'qwen3|qwen2\\.5'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  majordom-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: majordom-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      actual-budget:
        condition: service_healthy
    networks:
      - majordom-net
    # majordom-api is NOT exposed directly to the host.
    # All traffic goes through majordom-web (Nginx) which proxies /api/ here.
    # This keeps the API off the network and forces all requests through Nginx.
    # For local dev without Docker, uncomment the line below:
    # ports:
    #   - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  sqlite-web:
    image: coleifer/sqlite-web
    container_name: majordom-sqlite-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "8888:8080"
    volumes:
      - ./data:/data
    command: ["sqlite_web", "-H", "0.0.0.0", "-p", "8080", "/data/memory.db"]
    networks:
      - majordom-net

  majordom-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: majordom-web
    restart: unless-stopped
    ports:
      # Change WEB_PORT in .env to use a different port (default: 3000)
      - "${WEB_PORT:-3000}:80"
    depends_on:
      majordom-api:
        condition: service_started
    networks:
      - majordom-net


volumes:
  actual-data:
    name: majordom-actual-data
  ollama-data:
    name: majordom-ollama-data

networks:
  majordom-net:
    name: majordom-net
    driver: bridge
